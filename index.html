<script>
    const SCRIPT_URL = "ВАШ_URL_EXEC_ТУТ";

    function updateLabel() {
        const input = document.getElementById('fileInput');
        const label = document.getElementById('fileLabel');
        label.innerText = input.files.length > 0 ? "✅ Вибрано файлів: " + input.files.length : "📎 Додати фото / техпаспорти";
    }

    document.getElementById('argonForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        const files = document.getElementById('fileInput').files;
        
        btn.disabled = true;
        btn.innerText = "ОБРОБКА ФАЙЛІВ...";
        status.style.color = "#E30613";
        status.innerText = "⏳ Завантаження... Це може зайняти до 30 секунд.";

        // Збираємо текстові дані
        const rawData = new FormData(this);
        const payload = {
            address: rawData.get('address'),
            area: rawData.get('area'),
            price: rawData.get('price'),
            water: rawData.get('water') === 'Свій варіант' ? rawData.get('water_custom') : rawData.get('water'),
            sewer: rawData.get('sewer') === 'Свій варіант' ? rawData.get('sewer_custom') : rawData.get('sewer'),
            power: rawData.get('power'),
            floor: rawData.get('floor'),
            parking: rawData.get('parking'),
            repair: rawData.get('repair'),
            files: []
        };

        // Читаємо файли
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const base64 = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (f) => resolve(f.target.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            payload.files.push({
                base64: base64,
                name: file.name,
                type: file.type
            });
        }

        btn.innerText = "НАДСИЛАННЯ...";

        // Відправка через fetch
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        })
        .then(() => {
            status.style.color = "#10b981";
            status.innerHTML = "✅ Успішно надіслано! Файли збережено.";
            this.reset();
            updateLabel();
        })
        .catch(err => {
            status.style.color = "#ef4444";
            status.innerHTML = "❌ Помилка відправки.";
            console.error(err);
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "Надіслати пропозицію";
        });
    });
</script>
