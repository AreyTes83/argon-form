<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argon — Оренда нерухомості</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #EC4899;
            --text-main: #1e293b;
            --border: #cbd5e1;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f4fd 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .card {
            background: #ffffff;
            max-width: 550px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border-top: 8px solid var(--primary);
        }

        .header {
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #f1f5f9;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
        }

        form { padding: 30px; }

        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 20px;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row > div { flex: 1; }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }

        .file-help {
            font-size: 12px;
            color: #64748b;
            margin-top: -15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="logo">ARGON</div>
        <p style="font-size: 12px; color: #64748b; margin-top: 5px; font-weight: 600;">АНКЕТА ОБ'ЄКТА</p>
    </div>

    <form action="https://forminit.com/f/s5sa0f3ulyq" method="POST" enctype="multipart/form-data">
        
        <label>Адреса об'єкта *</label>
        <input type="text" name="name" required placeholder="Місто, вулиця, номер">

        <div class="row">
            <div>
                <label>Площа (м²) *</label>
                <input type="number" name="area" required>
            </div>
            <div>
                <label>Оренда (грн/міс) *</label>
                <input type="number" name="price" required>
            </div>
        </div>

        <div class="row">
            <div>
                <label>Електроенергія (кВт)</label>
                <input type="text" name="power" placeholder="50">
            </div>
            <div>
                <label>Поверх</label>
                <select name="floor">
                    <option value="1">1 поверх</option>
                    <option value="0">Цоколь</option>
                </select>
            </div>
        </div>

        <label>Додаткові деталі (ремонт, вода, каналізація)</label>
        <textarea name="message" rows="4" placeholder="Опишіть стан приміщення та комунікації..."></textarea>

        <label>Фото та техпаспорт</label>
        <input type="file" name="file" multiple>
        <p class="file-help">Можна обрати декілька файлів відразу</p>

        <button type="submit" class="btn">ВІДПРАВИТИ ПРОПОЗИЦІЮ</button>
    </form>
</div>

</body>
</html>
