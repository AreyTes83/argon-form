<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argon — Оренда нерухомості</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #EC4899;
            --bg-gradient: linear-gradient(135deg, #f0f4fd 0%, #c3cfe2 100%);
            --surface: rgba(255, 255, 255, 0.95);
            --text: #1e293b;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
        
        .container { background: var(--surface); max-width: 600px; width: 100%; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 50px 30px; text-align: center; color: white; }
        .logo { font-size: 42px; font-weight: 800; letter-spacing: 4px; margin: 0; }
        
        form { padding: 30px 40px; }
        .section-title { font-size: 14px; font-weight: 700; color: var(--primary); text-transform: uppercase; margin: 25px 0 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .field { margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 12px; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }
        
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }

        .file-box { border: 2px dashed var(--primary); padding: 25px; text-align: center; border-radius: 15px; background: rgba(79, 70, 229, 0.05); cursor: pointer; }
        
        .btn { width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 700; font-size: 17px; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); transition: 0.3s; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        #status { text-align: center; margin-top: 15px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="logo">ARGON</h1>
        <p style="opacity: 0.8; font-size: 13px; margin-top: 10px; font-weight: 500; letter-spacing: 1px;">ДЕПАРТАМЕНТ РОЗВИТКУ МЕРЕЖІ</p>
    </div>

    <form id="main-form">
        <div class="section-title">📍 Комерційна інформація</div>
        <div class="field">
            <label>Адреса об'єкта *</label>
            <input type="text" id="f-address" name="address" required placeholder="Місто, вулиця, номер">
        </div>

        <div class="row">
            <div class="field">
                <label>Площа (м²) *</label>
                <input type="number" id="f-area" name="area" required>
            </div>
            <div class="field">
                <label>Оренда (грн/міс) *</label>
                <input type="number" id="f-price" name="price" required>
            </div>
        </div>

        <div class="section-title">⚡ Технічні дані</div>
        <div class="row">
            <div class="field">
                <label>Електроенергія (кВт)</label>
                <input type="text" id="f-power" name="power">
            </div>
            <div class="field">
                <label>Поверх</label>
                <select id="f-floor" name="floor">
                    <option value="1 поверх">1 поверх</option>
                    <option value="Цоколь">Цоколь</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label>Додаткова інформація</label>
            <textarea id="f-desc" name="message" rows="3" placeholder="Опишіть стан ремонту..."></textarea>
        </div>

        <div class="section-title">📸 Фото та техпаспорт</div>
        <div class="file-box" onclick="document.getElementById('f-files').click()">
            <strong id="f-label" style="color: var(--primary);">📎 Прикріпити файли</strong>
            <input type="file" id="f-files" multiple style="display:none" onchange="updateLabel()">
        </div>

        <button type="submit" id="submit-btn" class="btn">ВІДПРАВИТИ ПРОПОЗИЦІЮ</button>
        <div id="status"></div>
    </form>
</div>

<script>
    function updateLabel() {
        const input = document.getElementById('f-files');
        document.getElementById('f-label').innerText = input.files.length > 0 ? "✅ Вибрано: " + input.files.length : "📎 Прикріпити файли";
    }

    document.getElementById("main-form").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById("submit-btn");
        const status = document.getElementById("status");
        const FORM_ID = "s5sa0f3ulyq";

        btn.disabled = true;
        btn.innerText = "ВІДПРАВКА...";
        status.innerText = "";

        // Збираємо дані вручну
        const formData = new FormData();
        formData.append("address", document.getElementById("f-address").value);
        formData.append("area", document.getElementById("f-area").value);
        formData.append("price", document.getElementById("f-price").value);
        formData.append("power", document.getElementById("f-power").value);
        formData.append("floor", document.getElementById("f-floor").value);
        formData.append("message", document.getElementById("f-desc").value);

        const files = document.getElementById("f-files").files;
        for (let i = 0; i < files.length; i++) {
            formData.append("file_" + i, files[i]);
        }

        try {
            // Використовуємо звичайний fetch (найбільш стабільний спосіб)
            const response = await fetch(`https://forminit.com/f/${FORM_ID}`, {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                status.style.color = "green";
                status.innerText = "✅ Успішно надіслано!";
                this.reset();
                document.getElementById('f-label').innerText = "📎 Прикріпити файли";
            } else {
                throw new Error("Помилка сервера");
            }
        } catch (err) {
            status.style.color = "red";
            status.innerText = "❌ Помилка відправки. Спробуйте ще раз.";
        } finally {
            btn.disabled = false;
            btn.innerText = "ВІДПРАВИТИ ПРОПОЗИЦІЮ";
        }
    });
</script>

</body>
</html>
