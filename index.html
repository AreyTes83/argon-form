<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argon — Пропозиція нерухомості</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E30613; /* Корпоративний червоний */
            --primary-hover: #b0050e;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --text: #1a1a1a;
            --border: #d1d5db;
            --surface: rgba(255, 255, 255, 0.98);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 40px 20px; 
        }
        
        .container { 
            background: var(--surface); 
            max-width: 600px; 
            width: 100%; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.1); 
            overflow: hidden; 
            border-top: 8px solid var(--primary);
        }
        
        .header { 
            background: #fff; 
            padding: 40px 30px; 
            text-align: center; 
            border-bottom: 1px solid #f1f5f9;
        }
        
        .logo-img { max-width: 200px; height: auto; }
        .header p { color: #64748b; font-size: 13px; margin-top: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
        
        form { padding: 30px 40px; }
        
        .section-title { 
            font-size: 13px; 
            font-weight: 800; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin: 25px 0 15px; 
            border-bottom: 2px solid #f1f5f9; 
            padding-bottom: 5px; 
            letter-spacing: 0.5px;
        }
        
        .field { position: relative; margin-bottom: 25px; }
        
        label { 
            position: absolute; left: 14px; top: 16px; 
            color: #94a3b8; pointer-events: none; 
            transition: all 0.3s ease; font-size: 15px; font-weight: 500;
        }
        
        input, select, textarea { 
            width: 100%; padding: 18px 14px 8px 14px; 
            border: 2px solid var(--border); border-radius: 12px; 
            font-size: 16px; transition: 0.3s; background: #fff;
            font-family: inherit; font-weight: 600; color: var(--text);
        }
        
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }
        
        /* Логіка Floating Labels */
        input:focus + label, input:not(:placeholder-shown) + label,
        textarea:focus + label, textarea:not(:placeholder-shown) + label,
        select:focus + label, select:valid + label {
            transform: translateY(-26px) scale(0.85);
            color: var(--primary); background: #fff; padding: 0 6px; left: 10px;
        }

        select { appearance: none; padding-top: 18px; cursor: pointer; }

        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }

        .file-box { 
            border: 2px dashed var(--primary); 
            padding: 25px; text-align: center; 
            border-radius: 16px; 
            background: rgba(227, 6, 19, 0.02); 
            cursor: pointer; transition: 0.3s;
        }
        .file-box:hover { background: rgba(227, 6, 19, 0.06); }

        .btn { 
            width: 100%; 
            background: var(--primary); 
            color: white; border: none; 
            padding: 20px; border-radius: 12px; 
            font-weight: 800; font-size: 17px; 
            cursor: pointer; margin-top: 25px; 
            box-shadow: 0 10px 25px rgba(227, 6, 19, 0.25); 
            transition: 0.3s; letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        #status { text-align: center; margin-top: 20px; font-weight: 700; font-size: 15px; min-height: 24px; }
        
        @media (max-width: 600px) {
            .row { flex-direction: column; gap: 0; }
            form { padding: 25px 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://i.ibb.co/3W3N5T3/argon-logo.png" alt="Argon Logo" class="logo-img">
        <p>Департамент розвитку мережі</p>
    </div>

            <label>Адреса об'єкта *</label>
        </div>

        <div class="row">
            <div class="field">
                <input type="number" name="area" id="area" required placeholder=" ">
                <label>Площа (м²) *</label>
            </div>
            <div class="field">
                <input type="number" name="price" id="price" required placeholder=" ">
                <label>Оренда (грн/міс) *</label>
            </div>
        </div>

        <div class="section-title">⚡ Технічні дані</div>
        <div class="row">
            <div class="field">
                <input type="text" name="power" id="power" placeholder=" ">
                <label>Електроенергія (кВт)</label>
            </div>
            <div class="field">
                <select name="floor" id="floor" required>
                    <option value="" disabled selected hidden></option>
                    <option value="1 поверх">1 поверх</option>
                    <option value="Цоколь">Цоколь</option>
                    <option value="Інший">Інший</option>
                </select>
                <label>Поверх *</label>
            </div>
        </div>
