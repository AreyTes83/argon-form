<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мережа ГРОШ — Анкета приміщення</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #E30613; --bg: #f8fafc; --text: #1e293b; --border: #cbd5e1; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #fff; max-width: 650px; width: 100%; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); overflow: hidden; }
        .step { display: none; padding: 30px 20px; animation: fadeIn 0.4s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .header { text-align: center; margin-bottom: 20px; }
        .logo-img { max-width: 180px; height: auto; margin-bottom: 10px; }
        h2 { color: var(--text); font-weight: 800; font-size: 22px; margin-bottom: 8px; }
        p.subtitle { color: #64748b; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-weight: 700; font-size: 14px; margin-bottom: 6px; color: #334155; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; font-family: inherit; }
        input:focus { border-color: var(--primary); outline: none; }
        .row { display: flex; gap: 12px; }
        .radio-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
        .radio-group label { flex: 1; min-width: 80px; padding: 12px 5px; border: 2px solid var(--border); border-radius: 10px; text-align: center; cursor: pointer; background: #fff; font-size: 14px; font-weight: 600; }
        .radio-group input { display: none; }
        .radio-group label:has(input:checked) { border-color: var(--primary); background: rgba(227, 6, 19, 0.05); color: var(--primary); font-weight: 800; }
        .file-box { border: 2px dashed var(--primary); padding: 25px; text-align: center; border-radius: 15px; background: rgba(227, 6, 19, 0.02); cursor: pointer; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        .section-title { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 20px 0 10px; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px; }
        @media (max-width: 480px) { .row { flex-direction: column; gap: 0; } .radio-group label { min-width: 45%; } }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="step active">
        <div class="header">
            <img src="logo.png" alt="ГРОШ" class="logo-img">
            <h2>Вітаємо!</h2>
            <p class="subtitle">Як можна до Вас звертатись?</p>
        </div>
        <div class="field"><input type="text" id="userNameInput" placeholder="Ваше ім'я"></div>
        <button class="btn" onclick="nextStep(2)">Продовжити</button>
    </div>

    <div id="step2" class="step">
        <div class="header"><p class="subtitle">Анкета приміщення</p></div>
        <form id="argonForm">
            <div class="section-title">📍 Локація</div>
            <div class="field"><label>Адреса приміщення *</label><input type="text" id="addressInput" required></div>
            <div class="row">
                <div class="field"><label>Площа (м²) *</label><input type="number" id="areaInput" required></div>
                <div class="field"><label>Оренда (грн) *</label><input type="number" id="priceInput" required></div>
            </div>

            <div class="section-title">💧 Комунікації</div>
            <div class="field">
                <label>Водопостачання *</label>
                <div class="radio-group">
                    <label><input type="radio" name="water" value="Так" checked onclick="document.getElementById('w_c').style.display='none'"><span>Так</span></label>
                    <label><input type="radio" name="water" value="Ні" onclick="document.getElementById('w_c').style.display='none'"><span>Ні</span></label>
                    <label><input type="radio" name="water" value="Інше" onclick="document.getElementById('w_c').style.display='block'"><span>Інше</span></label>
                </div>
                <input type="text" id="w_c" style="display:none; margin-top:10px" placeholder="Опишіть...">
            </div>

            <div class="field">
                <label>Водовідведення *</label>
                <div class="radio-group">
                    <label><input type="radio" name="sewer" value="Так" checked onclick="document.getElementById('s_c').style.display='none'"><span>Так</span></label>
                    <label><input type="radio" name="sewer" value="Ні" onclick="document.getElementById('s_c').style.display='none'"><span>Ні</span></label>
                    <label><input type="radio" name="sewer" value="Інше" onclick="document.getElementById('s_c').style.display='block'"><span>Інше</span></label>
                </div>
                <input type="text" id="s_c" style="display:none; margin-top:10px" placeholder="Опишіть...">
            </div>

            <div class="section-title">⚡ Технічні дані</div>
            <div class="row">
                <div class="field"><label>Потужність (кВт)</label><input type="text" id="powerInput"></div>
                <div class="field"><label>Поверх</label><select id="floorInput"><option value="Перший поверх">Перший поверх</option><option value="Цоколь">Цоколь</option></select></div>
            </div>
            <div class="field"><label>Парковка (місць)</label><input type="number" id="parkingInput" value="0"></div>
            <div class="field"><label>Ремонт</label><textarea id="repairInput" rows="2"></textarea></div>

            <div class="section-title">📸 Файли</div>
            <div class="file-box" onclick="document.getElementById('fileInput').click()">
                <strong id="fileLabel">📎 Додати фото / техпаспорти</strong>
                <input type="file" id="fileInput" multiple style="display:none" onchange="updateLabel()">
            </div>
            <button type="button" class="btn" onclick="nextStep(3)">Далі</button>
        </form>
    </div>

    <div id="step3" class="step">
        <div class="header">
            <h2>Майже готово!</h2>
            <p class="subtitle">Ваш номер телефону</p>
        </div>
        <div class="field">
            <input type="tel" id="userPhoneInput" value="+380" maxlength="13">
        </div>
        <button class="btn" id="finalSubmitBtn" onclick="submitAllData()">Надіслати</button>
        <div id="status" style="text-align:center; margin-top:15px; font-weight:700;"></div>
    </div>

    <div id="step4" class="step">
        <div class="header" style="padding: 40px 0;">
            <div style="font-size: 50px; margin-bottom: 15px;">✅</div>
            <h2>Дякуємо!</h2>
            <p style="color: #64748b; font-weight: 600;">Ми зв'яжемося з Вами.</p>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDRgsPCTgv-5Hnz4KUiu6ejjjDzZlXSPtfFD0FhU2RkSfvca1jyNDTlVgh1WYUWCSH1w/exec";
    
    // Маска телефону
    const phoneInput = document.getElementById('userPhoneInput');
    phoneInput.addEventListener('input', function (e) {
        if (!e.target.value.startsWith('+380')) {
            e.target.value = '+380';
        }
        e.target.value = e.target.value.replace(/[^\d+]/g, ''); // тільки цифри та +
    });

    function nextStep(n) {
        if (n === 2 && !document.getElementById('userNameInput').value) return alert("Введіть ім'я");
        if (n === 3 && !document.getElementById('argonForm').checkValidity()) return document.getElementById('argonForm').reportValidity();
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function updateLabel() {
        const input = document.getElementById('fileInput');
        document.getElementById('fileLabel').innerText = input.files.length > 0 ? "✅ Вибрано: " + input.files.length : "📎 Додати фото / техпаспорти";
    }

    async function submitAllData() {
        const phone = document.getElementById('userPhoneInput').value;
        if (phone.length < 13) return alert("Введіть коректний номер телефону (+380XXXXXXXXX)");

        const btn = document.getElementById('finalSubmitBtn');
        const status = document.getElementById('status');
        btn.disabled = true;
        btn.innerText = "ВІДПРАВКА...";
        status.innerText = "⌛ Завантаження...";

        // Збір комунікацій
        const waterRadio = document.querySelector('input[name="water"]:checked').value;
        const sewerRadio = document.querySelector('input[name="sewer"]:checked').value;

        const payload = {
            userName: document.getElementById('userNameInput').value,
            userPhone: phone,
            address: document.getElementById('addressInput').value,
            area: document.getElementById('areaInput').value,
            price: document.getElementById('priceInput').value,
            water: waterRadio === 'Інше' ? document.getElementById('w_c').value : waterRadio,
            sewer: sewerRadio === 'Інше' ? document.getElementById('s_c').value : sewerRadio,
            power: document.getElementById('powerInput').value,
            floor: document.getElementById('floorInput').value,
            parking: document.getElementById('parkingInput').value,
            repair: document.getElementById('repairInput').value,
            files: []
        };

        const fileInput = document.getElementById('fileInput');
        for (let i = 0; i < fileInput.files.length; i++) {
            const base64 = await new Promise((r) => {
                const rd = new FileReader();
                rd.onload = (f) => r(f.target.result.split(',')[1]);
                rd.readAsDataURL(fileInput.files[i]);
            });
            payload.files.push({ base64, name: fileInput.files[i].name, type: fileInput.files[i].type });
        }

        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => nextStep(4))
        .catch(() => {
            status.style.color = "red";
            status.innerText = "❌ Помилка. Спробуйте ще раз.";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
