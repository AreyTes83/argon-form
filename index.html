<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argon — Оренда</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4F46E5; --secondary: #EC4899; }
        body { font-family: 'Outfit', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; max-width: 500px; width: 100%; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); overflow: hidden; border-top: 6px solid var(--primary); }
        .header { padding: 30px; text-align: center; background: #fff; border-bottom: 1px solid #eee; }
        .logo { font-size: 32px; font-weight: 800; color: var(--primary); letter-spacing: 2px; }
        form { padding: 30px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; margin-bottom: 20px; font-family: inherit; }
        .btn { width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3); }
        .file-info { font-size: 12px; color: #64748b; margin-top: -10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="logo">ARGON</div>
        <p style="font-size: 12px; color: #666; margin-top: 5px;">АНКЕТА ОБ'ЄКТА</p>
    </div>

    <form action="https://forminit.com/f/s5sa0f3ulyq" method="POST" enctype="multipart/form-data">
        
        <label>Адреса об'єкта *</label>
        <input type="text" name="address" required placeholder="Місто, вулиця, номер">

        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>Площа (м²) *</label>
                <input type="number" name="area" required>
            </div>
            <div style="flex: 1;">
                <label>Ціна (грн/міс) *</label>
                <input type="number" name="price" required>
            </div>
        </div>

        <label>Електроенергія (кВт)</label>
        <input type="text" name="power" placeholder="50">

        <label>Поверх</label>
        <select name="floor">
            <option value="1 поверх">1 поверх</option>
            <option value="Цоколь">Цоколь</option>
        </select>

        <label>Додаткова інформація</label>
        <textarea name="message" rows="3" placeholder="Опишіть стан ремонту тощо..."></textarea>

        <label>Фото та техпаспорт</label>
        <input type="file" name="file" multiple>
        <p class="file-info">Можна вибрати декілька файлів відразу</p>

        <button type="submit" class="btn">ВІДПРАВИТИ</button>
    </form>
</div>

</body>
</html>
