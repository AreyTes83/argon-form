<script>
    const forminit = new Forminit();
    const FORM_ID = "s5sa0f3ulyq";

    function updateFiles() {
        const input = document.getElementById('file_input');
        document.getElementById('file_text').innerText = input.files.length > 0 ? "✅ Вибрано: " + input.files.length : "📎 Прикріпити файли";
    }

    document.getElementById("argon-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById("submit-btn");
        const result = document.getElementById("result");
        
        btn.disabled = true;
        btn.innerText = "ВІДПРАВКА...";
        result.textContent = "";

        // РУЧНИЙ ЗБІР ДАНИХ (Бронебійний метод)
        const form = e.target;
        const manualData = new FormData();
        
        // Додаємо кожне поле окремо
        manualData.append("address", form.querySelector('[name="address"]').value);
        manualData.append("area", form.querySelector('[name="area"]').value);
        manualData.append("price", form.querySelector('[name="price"]').value);
        manualData.append("power", form.querySelector('[name="power"]').value);
        manualData.append("floor", form.querySelector('[name="floor"]').value);
        manualData.append("message", form.querySelector('[name="message"]').value);
        
        // Додаємо файли
        const fileInput = document.getElementById('file_input');
        if (fileInput.files.length > 0) {
            for (let i = 0; i < fileInput.files.length; i++) {
                manualData.append("attachments", fileInput.files[i]);
            }
        }

        try {
            // Відправка
            const { data, error } = await forminit.submit(FORM_ID, manualData);

            if (error) {
                result.className = "error";
                result.textContent = "Помилка: " + error.message;
            } else {
                result.className = "success";
                result.textContent = "Дякуємо! Пропозицію успішно надіслано.";
                form.reset();
                document.getElementById('file_text').innerText = "📎 Прикріпити файли";
            }
        } catch (err) {
            result.className = "error";
            result.textContent = "Сталася помилка з'єднання.";
        } finally {
            btn.disabled = false;
            btn.innerText = "ВІДПРАВИТИ";
        }
    });
</script>
