<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argon — Оренда нерухомості</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #EC4899;
            --bg-gradient: linear-gradient(135deg, #f0f4fd 0%, #c3cfe2 100%);
            --surface: rgba(255, 255, 255, 0.9);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --radius: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background: var(--surface);
            backdrop-filter: blur(20px);
            max-width: 650px;
            width: 100%;
            border-radius: var(--radius);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 50px 30px;
            text-align: center;
            color: white;
            position: relative;
        }

        .logo { font-size: 42px; font-weight: 800; letter-spacing: 4px; margin-bottom: 5px; }

        form { padding: 30px 40px; }

        .section-title {
            font-size: 14px; font-weight: 700; color: var(--primary);
            text-transform: uppercase; margin: 30px 0 15px;
            display: flex; align-items: center; gap: 10px;
        }

        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .field { position: relative; margin-bottom: 20px; }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%; padding: 14px 16px; border: 2px solid var(--border);
            border-radius: 12px; font-family: inherit; font-size: 15px;
            background: white; transition: var(--transition);
        }

        input:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        .row { display: flex; gap: 15px; }

        /* Selector Styling */
        .selector {
            display: flex; background: #e2e8f0; padding: 4px; border-radius: 12px;
            position: relative; z-index: 1;
        }
        .selector input { display: none; }
        .selector label {
            flex: 1; text-align: center; padding: 10px; cursor: pointer;
            font-weight: 600; font-size: 13px; z-index: 2; transition: 0.3s;
        }
        .selector input:checked + label { color: var(--primary); }

        .slider {
            position: absolute; top: 4px; bottom: 4px; left: 4px;
            width: calc(33.33% - 4px); background: white; border-radius: 9px;
            transition: transform 0.3s ease; z-index: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #w1:checked ~ .slider, #d1:checked ~ .slider { transform: translateX(0); }
        #w2:checked ~ .slider, #d2:checked ~ .slider { transform: translateX(100%); }
        #w3:checked ~ .slider, #d3:checked ~ .slider { transform: translateX(200%); }

        .hidden-input { display: none; margin-top: 10px; }

        /* File Upload Styling */
        .file-zone {
            border: 2px dashed var(--primary);
            padding: 25px; border-radius: 12px; text-align: center;
            background: rgba(79, 70, 229, 0.05); cursor: pointer; transition: 0.3s;
        }
        .file-zone:hover { background: rgba(79, 70, 229, 0.1); }

        .btn {
            width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 18px; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="logo">ARGON</h1>
        <p>Департамент розвитку</p>
    </div>

    <form action="https://forminit.com/f/s5sa0f3ulyq" method="POST" enctype="multipart/form-data">
        
        <div class="section-title">📍 Комерційні дані</div>
        
        <div class="field">
            <label style="font-size: 13px; font-weight: 700; margin-bottom: 5px; display: block;">Адреса об'єкта *</label>
            <input type="text" name="Адреса" placeholder="Вулиця, номер, місто" required>
        </div>

        <div class="row">
            <div class="field">
                <label style="font-size: 13px; font-weight: 700; margin-bottom: 5px; display: block;">Площа (м²) *</label>
                <input type="number" name="Площа" required>
            </div>
            <div class="field">
                <label style="font-size: 13px; font-weight: 700; margin-bottom: 5px; display: block;">Оренда (грн/міс) *</label>
                <input type="number" name="Вартість" required>
            </div>
        </div>

        <div class="section-title">⚙️ Технічні параметри</div>

        <div class="field">
            <label style="font-size: 13px; font-weight: 700; margin-bottom: 5px; display: block;">Водопостачання *</label>
            <div class="selector">
                <input type="radio" name="Вода" id="w1" value="Так" onclick="toggle('w_ext', false)" required checked>
                <label for="w1">Так</label>
                <input type="radio" name="Вода" id="w2" value="Ні" onclick="toggle('w_ext', false)">
                <label for="w2">Ні</label>
                <input type="radio" name="Вода" id="w3" value="Свій варіант" onclick="toggle('w_ext', true)">
                <label for="w3">Свій варіант</label>
                <div class="slider"></div>
            </div>
            <input type="text" id="w_ext" name="Вода_деталі" class="hidden-input" placeholder="Детальніше про воду...">
        </div>

        <div class="field">
            <label style="font-size: 13px; font-weight: 700; margin-bottom: 5px; display: block;">Водовідведення *</label>
            <div class="selector">
                <input type="radio" name="Каналізація" id="d1" value="Так" onclick="toggle('d_ext', false)" required checked>
                <label for="d1">Так</label>
                <input type="radio" name="Каналізація" id="d2" value="Ні" onclick="toggle('d_ext', false)">
                <label for="d2">Ні</label>
                <input type="radio" name="Каналізація" id="d3" value="Свій варіант" onclick="toggle('d_ext', true)">
                <label for="d3">Свій варіант</label>
                <div class="slider"></div>
            </div>
            <input type="text" id="d_ext" name="Каналізація_деталі" class="hidden-input" placeholder="Детальніше про каналізацію...">
        </div>

        <div class="row">
            <div class="field">
                <label style="font-size: 13px; font-weight: 700; margin-bottom: 5px; display: block;">Потужність (кВт) *</label>
                <input type="text" name="кВт" required>
            </div>
            <div class="field">
                <label style="font-size: 13px; font-weight: 700; margin-bottom: 5px; display: block;">Поверх *</label>
                <select name="Поверх" required>
                    <option value="1 поверх">1 поверх</option>
                    <option value="Цоколь">Цоколь</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label style="font-size: 13px; font-weight: 700; margin-bottom: 5px; display: block;">Ремонт та стан</label>
            <textarea name="Ремонт" placeholder="Опишіть стан..."></textarea>
        </div>

        <div class="section-title">📂 Фото та документи</div>
        
        <div class="field">
            <div class="file-zone" onclick="document.getElementById('f').click()">
                <strong style="color: var(--primary);">📎 Прикріпити фото / техпаспорт</strong>
                <p id="f_status" style="font-size: 12px; color: var(--text-muted); margin-top: 5px;">Натисніть тут для завантаження файлів</p>
                <input type="file" id="f" name="attachments" multiple style="display:none" onchange="updateF()">
            </div>
        </div>

        <button type="submit" class="btn">ВІДПРАВИТИ ПРОПОЗИЦІЮ</button>
    </form>
</div>

<script>
    function toggle(id, show) { document.getElementById(id).style.display = show ? 'block' : 'none'; }
    function updateF() {
        const input = document.getElementById('f');
        document.getElementById('f_status').innerText = input.files.length > 0 ? "✅ Вибрано файлів: " + input.files.length : "Натисніть для завантаження";
    }
</script>

</body>
</html>
