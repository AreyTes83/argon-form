<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argon — Оренда нерухомості</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #EC4899;
            --bg-gradient: linear-gradient(135deg, #f0f4fd 0%, #c3cfe2 100%);
            --surface: rgba(255, 255, 255, 0.95);
            --text: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 40px 20px; 
        }
        
        .container { 
            background: var(--surface); 
            max-width: 600px; 
            width: 100%; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.1); 
            overflow: hidden; 
        }
        
        .header { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            padding: 50px 30px; 
            text-align: center; 
            color: white; 
        }
        
        .logo { font-size: 42px; font-weight: 800; letter-spacing: 4px; margin: 0; }
        
        form { padding: 30px 40px; }
        .section-title { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin: 25px 0 15px; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 5px; 
        }
        
        .field { margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        
        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #cbd5e1; 
            border-radius: 12px; 
            font-size: 15px; 
            transition: 0.3s; 
            background: white;
        }
        
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }
        
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }

        .file-box { 
            border: 2px dashed var(--primary); 
            padding: 25px; 
            text-align: center; 
            border-radius: 15px; 
            background: rgba(79, 70, 229, 0.05); 
            cursor: pointer; 
            transition: 0.3s;
        }
        
        .file-box:hover { background: rgba(79, 70, 229, 0.1); }

        .btn { 
            width: 100%; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 17px; 
            cursor: pointer; 
            margin-top: 20px; 
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); 
            transition: 0.3s; 
        }
        
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        #status { text-align: center; margin-top: 15px; font-weight: 600; font-size: 14px; }
        
        @media (max-width: 600px) {
            .row { flex-direction: column; gap: 0; }
            form { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="logo">ARGON</h1>
        <p style="opacity: 0.8; font-size: 13px; margin-top: 10px; font-weight: 500; letter-spacing: 1px;">ДЕПАРТАМЕНТ РОЗВИТКУ МЕРЕЖІ</p>
    </div>

    <form id="argonForm">
        <div class="section-title">📍 Локація та комерція</div>
        <div class="field">
            <label>Адреса об'єкта *</label>
            <input type="text" name="address" required placeholder="Місто, вулиця, номер">
        </div>

        <div class="row">
            <div class="field">
                <label>Площа (м²) *</label>
                <input type="number" name="area" required>
            </div>
            <div class="field">
                <label>Оренда (грн/міс) *</label>
                <input type="number" name="price" required>
            </div>
        </div>

        <div class="section-title">⚡ Технічні дані</div>
        <div class="row">
            <div class="field">
                <label>Електроенергія (кВт)</label>
                <input type="text" name="power" placeholder="50 кВт">
            </div>
            <div class="field">
                <label>Поверх</label>
                <select name="floor">
                    <option value="1 поверх">1 поверх</option>
                    <option value="Цоколь">Цоколь</option>
                    <option value="Інший">Інший</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label>Додаткові деталі (стан, ремонт)</label>
            <textarea name="message" rows="3" placeholder="Опишіть об'єкт..."></textarea>
        </div>

        <div class="section-title">📸 Фото та техпаспорт</div>
        <div class="file-box" onclick="document.getElementById('fileInput').click()">
            <strong id="fileLabel" style="color: var(--primary);">📎 Прикріпити файл</strong>
            <input type="file" id="fileInput" style="display:none" onchange="updateFileName()">
        </div>

        <button type="submit" id="submitBtn" class="btn">ВІДПРАВИТИ ПРОПОЗИЦІЮ</button>
        <div id="status"></div>
    </form>
</div>

<script>
    // ВАШЕ ПІДТВЕРДЖЕНЕ ПОСИЛАННЯ
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwE5wIUB395tnZjbozQW-ZtXcfEzsWAXIVZFrL84wdKucxZZqpxkGr5BCcnrjx-NHurOw/exec";

    function updateFileName() {
        const input = document.getElementById('fileInput');
        document.getElementById('fileLabel').innerText = input.files.length > 0 ? "✅ Вибрано: " + input.files[0].name : "📎 Прикріпити файл";
    }

    document.getElementById('argonForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        const file = document.getElementById('fileInput').files[0];
        
        btn.disabled = true;
        btn.innerText = "ОБРОБКА ТА ВІДПРАВКА...";
        status.innerText = "";

        if (file) {
            const reader = new FileReader();
            reader.onload = function(f) {
                const base64Data = f.target.result.split(',')[1];
                sendToGoogle(base64Data, file.name, file.type);
            };
            reader.readAsDataURL(file);
        } else {
            sendToGoogle(null, null, null);
        }

        function sendToGoogle(base64, fileName, fileType) {
            const formData = new FormData(document.getElementById('argonForm'));
            
            // Збираємо параметри для URL
            const params = new URLSearchParams();
            formData.forEach((value, key) => {
                params.append(key, value);
            });
            
            // Додаємо дані файлу, якщо вони є
            if (base64) {
                params.append('fileData', base64);
                params.append('fileName', fileName);
                params.append('fileType', fileType);
            }

            // Відправка
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Важливо для Google Scripts
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            })
            .then(() => {
                status.style.color = "#10b981";
                status.innerHTML = "✅ Успішно! Дані збережено в таблиці, файл завантажено.";
                document.getElementById('argonForm').reset();
                document.getElementById('fileLabel').innerText = "📎 Прикріпити файл";
            })
            .catch(err => {
                status.style.color = "#ef4444";
                status.innerHTML = "❌ Помилка відправки. Перевірте з'єднання.";
                console.error(err);
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = "ВІДПРАВИТИ ПРОПОЗИЦІЮ";
            });
        }
    });
</script>

</body>
</html>
