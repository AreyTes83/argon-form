<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мережа ГРОШ — Анкета приміщення</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #E30613; --bg: #f8fafc; --text: #1e293b; --border: #cbd5e1; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); padding: 40px 20px; display: flex; justify-content: center; }
        .container { background: #fff; max-width: 650px; width: 100%; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); overflow: hidden; }
        .header { padding: 40px 30px; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .logo-img { max-width: 240px; height: auto; }
        .header p { color: #64748b; font-size: 13px; margin-top: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        form { padding: 30px 40px; }
        .section-title { font-size: 13px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 25px 0 10px; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-weight: 700; font-size: 14px; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; font-size: 15px; font-family: inherit; }
        input:focus { border-color: var(--primary); outline: none; }
        .row { display: flex; gap: 15px; }
        .radio-group { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .file-box { border: 2px dashed var(--primary); padding: 35px; text-align: center; border-radius: 15px; background: rgba(227, 6, 19, 0.02); cursor: pointer; transition: 0.3s; }
        .file-box:hover { background: rgba(227, 6, 19, 0.06); }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 20px; border-radius: 12px; font-weight: 800; font-size: 17px; cursor: pointer; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        #status { text-align: center; margin-top: 15px; font-weight: 700; }
        @media (max-width: 600px) { .row { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="ГРОШ" class="logo-img">
        <p>Департамент розвитку мережі</p>
    </div>

    <form id="argonForm">
        <div class="section-title">📍 Локація</div>
        <div class="field">
            <label>Адреса приміщення *</label>
            <input type="text" name="address" required placeholder="Вулиця, номер, місто">
        </div>
        <div class="row">
            <div class="field"><label>Площа (м²) *</label><input type="number" name="area" required></div>
            <div class="field"><label>Оренда (грн/міс) *</label><input type="number" name="price" required></div>
        </div>

        <div class="section-title">💧 Комунікації</div>
        <div class="field">
            <label>Водопостачання</label>
            <div class="radio-group">
                <label><input type="radio" name="water" value="Так" checked onclick="document.getElementById('w_c').style.display='none'"> Так</label>
                <label><input type="radio" name="water" value="Ні" onclick="document.getElementById('w_c').style.display='none'"> Ні</label>
                <label><input type="radio" name="water" value="Інше" onclick="document.getElementById('w_c').style.display='block'"> Свій варіант</label>
            </div>
            <input type="text" id="w_c" name="water_custom" style="display:none; margin-top:10px" placeholder="Опишіть варіант...">
        </div>

        <div class="field">
            <label>Водовідведення</label>
            <div class="radio-group">
                <label><input type="radio" name="sewer" value="Так" checked onclick="document.getElementById('s_c').style.display='none'"> Так</label>
                <label><input type="radio" name="sewer" value="Ні" onclick="document.getElementById('s_c').style.display='none'"> Ні</label>
                <label><input type="radio" name="sewer" value="Інше" onclick="document.getElementById('s_c').style.display='block'"> Свій варіант</label>
            </div>
            <input type="text" id="s_c" name="sewer_custom" style="display:none; margin-top:10px" placeholder="Опишіть варіант...">
        </div>

        <div class="section-title">⚡ Технічні дані</div>
        <div class="row">
            <div class="field"><label>Потужність (кВт)</label><input type="text" name="power"></div>
            <div class="field"><label>Поверх</label><select name="floor"><option>Перший поверх</option><option>Цоколь</option></select></div>
        </div>
        <div class="field"><label>Парковка (місць)</label><input type="number" name="parking" value="0"></div>
        <div class="field"><label>Ремонт</label><textarea name="repair" rows="3" placeholder="Опишіть потребу в ремонті..."></textarea></div>

        <div class="section-title">📸 Фото та техпаспорт</div>
        <div class="file-box" onclick="document.getElementById('fileInput').click()">
            <strong id="fileLabel">📎 Додати фото / техпаспорти</strong>
            <input type="file" id="fileInput" multiple style="display:none" onchange="updateLabel()">
        </div>

        <button type="submit" id="submitBtn" class="btn">НАДІСЛАТИ ПРОПОЗИЦІЮ</button>
        <div id="status"></div>
    </form>
</div>
